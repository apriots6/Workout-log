<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7f8fa">
<!-- 아이폰 '홈 화면에 추가' 시 앱처럼 전체화면으로 실행 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Training Log">
<title>Training Log</title>
<style>
  :root{
    --bg:#f7f8fa;
    --card:#ffffff;
    --ink:#1a1d21;
    --ink-soft:#6b7280;
    --ink-faint:#9aa1ac;
    --line:#e7e9ee;
    --line-soft:#f0f2f5;
    --accent:#3b82f6;
    --accent-soft:#eaf2ff;
    --accent-ink:#1d4ed8;
    --good:#16a34a;
    --good-soft:#e8f7ee;
    --pr:#e0662a;
    --pr-soft:#fdeee4;
    --danger:#dc2626;
    --radius:16px;
    --shadow:0 1px 2px rgba(20,25,35,.05), 0 6px 20px rgba(20,25,35,.05);
    --nav-h:64px;
    --mono:"JetBrains Mono","SF Mono",ui-monospace,"Menlo",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",Roboto,sans-serif;
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }
  .app{max-width:560px;margin:0 auto;min-height:100vh;padding:0 0 calc(var(--nav-h) + env(safe-area-inset-bottom));}
  /* header */
  header.top{
    position:sticky;top:0;z-index:20;
    background:rgba(247,248,250,.85);backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  header.top h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  header.top h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .htools{display:flex;align-items:center;gap:8px}
  /* 종목별 단위 토글 (kg/lb) */
  .unit-mini{display:inline-flex;background:var(--line-soft);border:1px solid var(--line);border-radius:999px;padding:2px;font-family:var(--mono);font-size:11px;font-weight:700}
  .unit-mini button{border:none;background:none;color:var(--ink-faint);padding:3px 9px;border-radius:999px;cursor:pointer;font:inherit;line-height:1.4}
  .unit-mini button.on{background:var(--card);color:var(--accent-ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:17px;line-height:1;display:grid;place-items:center;color:var(--ink-soft)}
  .icon-btn:active{transform:scale(.96)}

  main{padding:16px}
  .view{display:none}
  .view.active{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .card h2{margin:0 0 12px;font-size:15px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .muted{color:var(--ink-soft)}
  .faint{color:var(--ink-faint)}
  .mono{font-family:var(--mono)}
  .sectitle{font-size:13px;font-weight:700;color:var(--ink-soft);letter-spacing:.02em;margin:2px 0 10px;text-transform:uppercase}

  /* buttons */
  .btn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-weight:600;font-size:15px;padding:13px 16px;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.good{background:var(--good);border-color:var(--good);color:#fff}
  .btn.pr{background:var(--pr);border-color:var(--pr);color:#fff}
  .btn.ghost{background:transparent;border-color:var(--line)}
  .btn.sm{padding:8px 12px;font-size:13px;border-radius:10px}
  .btn.block{width:100%}
  .btn.danger{color:var(--danger);border-color:#f2c4c4}
  .btn-row{display:flex;gap:10px}
  .btn-row .btn{flex:1}

  /* inputs */
  input,select{font-family:inherit;font-size:16px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 12px;width:100%}
  input:focus,select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  input.num{font-family:var(--mono);text-align:center;padding:11px 6px}
  label.fl{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:0 0 6px}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 9px;border-radius:999px;background:var(--line-soft);color:var(--ink-soft);font-family:var(--mono)}
  .badge.accent{background:var(--accent-soft);color:var(--accent-ink)}
  .badge.pr{background:var(--pr-soft);color:var(--pr)}
  .badge.good{background:var(--good-soft);color:var(--good)}

  /* timer hero */
  .hero{background:linear-gradient(135deg,#1f2937,#111827);color:#fff;border:none}
  .hero .row{display:flex;justify-content:space-between;align-items:flex-end}
  .hero .lab{font-size:12px;color:#9aa4b2;font-weight:600;letter-spacing:.03em}
  .hero .time{font-family:var(--mono);font-size:38px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .hero .vol{font-family:var(--mono);font-size:20px;font-weight:700;text-align:right}

  /* exercise entry */
  .entry{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px;background:var(--card)}
  .entry-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
  .entry-head .nm{font-weight:700;font-size:15px}
  .entry-head .bp{font-size:11px;color:var(--ink-faint);font-weight:600}
  .lastrec{font-size:12px;color:var(--ink-soft);margin:2px 0 10px;font-family:var(--mono)}
  button.lastrec.tap{display:inline-block;border:none;background:none;padding:2px 0;cursor:pointer;text-align:left;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:3px}
  button.lastrec.tap:active{color:var(--accent)}
  .memo{font-size:13px;padding:8px 10px;border:1px dashed var(--line);border-radius:9px;margin:0 0 10px;background:var(--line-soft)}
  .memo:focus{border-style:solid;background:var(--card)}
  /* 지난 기록 팝업 */
  .hlist{max-height:56vh;overflow:auto;-webkit-overflow-scrolling:touch}
  .hcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px}
  .hvol{font-size:18px;margin:2px 0}
  .hmemo{font-size:13px;color:var(--ink-soft);background:var(--line-soft);border-radius:8px;padding:7px 10px;margin-bottom:8px}
  .hsets2{display:flex;flex-direction:column;gap:1px}
  .hset-row{display:grid;grid-template-columns:24px 1fr 1fr 52px;align-items:center;gap:6px;padding:8px 4px;border-top:1px solid var(--line-soft);font-family:var(--mono)}
  .hset-row .hset-i{color:var(--ink-faint);font-size:12px}
  .hcell{display:flex;align-items:baseline;gap:5px;min-width:0}
  .hcell .hn{min-width:2.6em;font-size:15px;font-weight:700}
  .hcell .u{font-size:12px;color:var(--ink-faint);font-weight:400}
  .hset-rpe{text-align:right;font-size:11px;color:var(--ink-faint);white-space:nowrap}
  .setgrid{display:grid;grid-template-columns:44px 1fr 12px 1fr 1fr 26px;gap:6px;align-items:center;margin-bottom:6px;border-radius:8px}
  .setgrid.done{background:var(--good-soft)}
  .setgrid .idx{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
  .setgrid .idx .setchk{width:20px;height:20px;margin:0;accent-color:var(--good);flex:none}
  .setgrid.done .idx{color:var(--good);font-weight:700}
  .setgrid .x{text-align:center;color:var(--ink-faint);font-family:var(--mono)}
  .setgrid .rmset{border:none;background:none;color:var(--ink-faint);font-size:16px;cursor:pointer;padding:4px}
  .set-head{font-size:11px;color:var(--ink-faint);font-weight:600}
  .rec{margin-top:8px;padding:9px 11px;border-radius:10px;background:var(--accent-soft);color:var(--accent-ink);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;line-height:1.35}
  .rec.pr{background:var(--pr-soft);color:var(--pr)}
  .rec .em{font-size:15px}

  .addrow{display:grid;grid-template-columns:1fr 108px;gap:8px;margin-top:4px}
  .empty{text-align:center;padding:36px 16px;color:var(--ink-soft)}
  .empty .big{font-size:34px;margin-bottom:8px}

  /* history */
  .sess-card .sh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .sess-card .sh .d{font-weight:700}
  .sess-card ul{list-style:none;margin:0;padding:0}
  .sess-card li{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--line-soft);font-size:14px}
  .sess-card li .sv{font-family:var(--mono);color:var(--ink-soft);font-size:13px}
  .subtabs{display:flex;gap:6px;margin-bottom:14px}
  .subtabs button{flex:1;padding:9px;border:1px solid var(--line);background:var(--card);border-radius:10px;font:inherit;font-weight:600;font-size:14px;color:var(--ink-soft);cursor:pointer}
  .subtabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* recovery list */
  .recrow{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--line-soft)}
  .recrow:first-of-type{border-top:none}
  .recdot{width:12px;height:12px;border-radius:50%;flex:none}
  .recname{font-weight:600;flex:1}
  .recpct{font-family:var(--mono);font-weight:700;width:78px;text-align:right;white-space:nowrap}
  .recago{font-family:var(--mono);font-size:12px;width:54px;text-align:right;white-space:nowrap}

  /* exercise picker */
  .catrow{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
  .catrow::-webkit-scrollbar{display:none}
  .catchip{flex:none;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 15px;font:inherit;font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;white-space:nowrap}
  .catchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .exlistbox{max-height:52vh;overflow:auto;margin:0 -4px;-webkit-overflow-scrolling:touch}
  .exrow{display:flex;justify-content:space-between;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line-soft);padding:15px 6px;font:inherit;cursor:pointer;color:var(--ink)}
  .exrow:active{background:var(--line-soft)}
  .exrow .exn{font-weight:600;font-size:16px}
  .exrow .exbp{font-size:12px;color:var(--ink-faint);font-family:var(--mono);flex:none}
  .exrow.addnew .exn{color:var(--accent-ink)}

  /* drag-to-reorder */
  .drag-handle{flex:none;cursor:grab;color:var(--ink-faint);font-size:17px;line-height:1;padding:8px 5px;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .rpe-note{font-size:11px;color:var(--ink-faint);margin:4px 0 2px;text-align:right}
  .drag-handle:active{cursor:grabbing}
  .dragging{opacity:.92;background:var(--accent-soft)!important;box-shadow:0 8px 24px rgba(20,25,35,.2);border-radius:12px;position:relative;z-index:5}
  body.dragging-active,body.dragging-active *{-webkit-user-select:none!important;user-select:none!important}
  body.dragging-active *{cursor:grabbing!important}

  /* routine item rows */
  .reitem{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line-soft)}
  .reitem-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .reitem-actions{display:flex;gap:4px;align-items:center;flex:none}
  .rebtn{border:1px solid var(--line);background:var(--card);border-radius:8px;height:32px;min-width:32px;display:inline-grid;place-items:center;font-size:15px;color:var(--ink-soft);cursor:pointer;padding:0;font-family:inherit}
  .rebtn:active{transform:scale(.94)}
  .rebtn.dim{opacity:.28;pointer-events:none}
  .rebtn.edit{padding:0 9px;font-size:13px;font-weight:600}
  .rebtn.rm{border-color:transparent;background:none;color:var(--danger);font-size:16px}
  .reitem-edit{padding:14px;border:1px solid var(--accent);border-radius:12px;background:var(--accent-soft);margin:10px 0}
  .reitem-edit .fl{margin-bottom:4px}

  /* report bars */
  .barrow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .barrow .nm{width:52px;font-size:13px;font-weight:600;flex:none}
  .bartrack{flex:1;height:22px;background:var(--line-soft);border-radius:7px;overflow:hidden;position:relative}
  .barfill{height:100%;background:var(--accent);border-radius:7px;min-width:2px;transition:width .3s}
  .barrow .val{width:96px;text-align:right;font-family:var(--mono);font-size:12px;flex:none}
  .delta{font-family:var(--mono);font-size:11px;font-weight:700}
  .delta.up{color:var(--good)}.delta.down{color:var(--danger)}.delta.flat{color:var(--ink-faint)}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .stat .n{font-family:var(--mono);font-size:20px;font-weight:700}
  .stat .l{font-size:11px;color:var(--ink-soft);margin-top:2px}
  .weeknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .weeknav .rng{font-weight:700;font-size:14px}
  .spark{display:block}

  /* bottom nav */
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex}
  nav.tabs .app-in{max-width:560px;margin:0 auto;display:flex;width:100%}
  nav.tabs button{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink-faint);font:inherit;font-size:11px;font-weight:600;padding:8px 0}
  nav.tabs button .ic{font-size:20px;line-height:1}
  nav.tabs button.on{color:var(--accent)}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(15,20,30,.42);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .scrim.open{display:flex}
  .sheet{background:var(--card);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:up .22s ease;max-height:88vh;overflow:auto}
  @media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:20px}}
  @keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
  .sheet h3{margin:0 0 4px;font-size:19px;font-weight:800}
  .sheet .sub{color:var(--ink-soft);font-size:14px;margin:0 0 16px}
  .summ{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:6px 0 16px}
  .summ .c{background:var(--line-soft);border-radius:12px;padding:14px;text-align:center}
  .summ .c .n{font-family:var(--mono);font-size:24px;font-weight:700}
  .summ .c .l{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .prlist{margin:0 0 14px;padding:0;list-style:none}
  .prlist li{background:var(--pr-soft);color:var(--pr);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;margin-bottom:6px;display:flex;gap:8px;align-items:center}
  a.link{color:var(--accent);text-decoration:none;font-weight:600}
  .toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 20px);transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;z-index:80;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1><span class="dot"></span> Training Log</h1>
    <div class="htools">
      <button class="icon-btn" id="menuBtn" title="메뉴">⋯</button>
    </div>
  </header>

  <main>
    <section id="view-today" class="view active"></section>
    <section id="view-recovery" class="view"></section>
    <section id="view-history" class="view"></section>
    <section id="view-routines" class="view"></section>
    <section id="view-report" class="view"></section>
  </main>
</div>

<nav class="tabs">
  <div class="app-in">
    <button data-tab="today" class="on"><span class="ic">🏋️</span>오늘</button>
    <button data-tab="recovery"><span class="ic">🔋</span>회복</button>
    <button data-tab="history"><span class="ic">📖</span>기록</button>
    <button data-tab="routines"><span class="ic">📋</span>루틴</button>
    <button data-tab="report"><span class="ic">📊</span>리포트</button>
  </div>
</nav>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept="application/json" style="display:none">
<datalist id="exlist"></datalist>

<script>
(function(){
"use strict";

/* ============================================================
   상수 · 연구 근거 (RPE/RIR + Epley)
   ------------------------------------------------------------
   - Epley(1985):  e1RM = w * (1 + reps/30)   // RPE 미입력 시 폴백
   - RIR 기반 RPE 스케일(Zourdos et al. 2016; Helms et al. 2016):
     (reps, RPE) -> %1RM 룩업. RPE = 10 - RIR (남은 여유 반복수).
     아래 표는 RTS/Helms 계열의 표준 %1RM 차트를 사용.
   ============================================================ */
  var BODY_PARTS=["가슴","등","어깨","하체","팔","코어","유산소"];

  var SEED_EX={ // 종목 -> 부위 (자동완성 + 부위 자동채움)
    "벤치프레스":"가슴","인클라인 벤치프레스":"가슴","덤벨 프레스":"가슴","체스트 프레스":"가슴",
    "딥스":"가슴","펙덱 플라이":"가슴",
    "데드리프트":"등","바벨 로우":"등","랫풀다운":"등","시티드 로우":"등","풀업":"등","티바 로우":"등",
    "오버헤드 프레스":"어깨","숄더 프레스":"어깨","사이드 레터럴 레이즈":"어깨","페이스 풀":"어깨","리어 델트 플라이":"어깨",
    "스쿼트":"하체","레그 프레스":"하체","루마니안 데드리프트":"하체","레그 익스텐션":"하체","레그 컬":"하체","런지":"하체","힙 쓰러스트":"하체","카프 레이즈":"하체",
    "바벨 컬":"팔","덤벨 컬":"팔","해머 컬":"팔","트라이셉스 익스텐션":"팔","케이블 푸시다운":"팔","프리처 컬":"팔",
    "플랭크":"코어","크런치":"코어","행잉 레그 레이즈":"코어","앱 롤아웃":"코어",
    "러닝":"유산소","사이클":"유산소","로잉":"유산소","인클라인 워킹":"유산소"
  };

  // %1RM 차트: RPE_CHART[reps][rpe] = %1RM.  rpe 6.0~10.0 (0.5 단위), reps 1~12
  var RPE_CHART={

  function $(s,r){return (r||document).querySelector(s);}
  function $$(r,s){return Array.prototype.slice.call((r||document).querySelectorAll(s));}
  function el(tag,attrs,html){var e=document.createElement(tag);if(attrs)for(var k in attrs)e.setAttribute(k,attrs[k]);if(html!=null)e.innerHTML=html;return e;}
  function uid(p){return (p||"e")+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,6);}
  function todayISO(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function fmt(n){if(n==null||isNaN(n))return "0";var r=Math.round(n*10)/10;return (r%1===0?r.toFixed(0):r.toFixed(1)).replace(/\B(?=(\d{3})+(?!\d))/g,",");}
  var toastT;
  function toast(msg){var t=$("#toast");if(!t)return;t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove("show");},1600);}

  // 단위 변환 (저장은 입력 단위 그대로, 계산/집계는 kg 기준으로 정규화)
  function toKg(w,unit){w=+w||0;return unit==="lb"?w/LB_PER_KG:w;}
  function fromKg(w,unit){return unit==="lb"?w*LB_PER_KG:w;}
  function incForUnit(unit){return unit==="lb"?settings.incrementLb:settings.incrementKg;}
  function roundToUnit(w,unit){var inc=incForUnit(unit);return Math.round(w/inc)*inc;}

/* ============================================================
   추천/1RM 계산
   ============================================================ */
  function pctFromRepsRPE(reps,rpe){
    reps=Math.max(1,Math.min(12,Math.round(reps)));
    rpe=Math.max(6,Math.min(10,Math.round(rpe*2)/2));
    return RPE_CHART[reps][rpe]/100;
  }
  // 추정 1RM(kg). weightKg = kg로 정규화된 무게
  function estimate1RM(weightKg,reps,rpe){
    if(rpe!=null && reps<=12 && reps>=1){return weightKg/pctFromRepsRPE(reps,rpe);}
    return weightKg*(1+reps/30); // Epley 폴백
  }
  // 다음 세트 추천: 표시 단위 기준 weight 반환
  function recommendNextSet(e1rmKg,targetReps,unit){
    var pct=pctFromRepsRPE(targetReps,TARGET_RPE);
    var wDisp=roundToUnit(fromKg(e1rmKg*pct,unit),unit);
    return {weight:wDisp,reps:targetReps,rpe:TARGET_RPE};
  }

/* ============================================================
   종목 카탈로그
   ============================================================ */
  function findEx(name){for(var i=0;i<exercises.length;i++)if(exercises[i].name===name)return exercises[i];return null;}
  function ensureEx(name,bodyPart){var e=findEx(name);if(!e){e={name:name,bodyPart:bodyPart||SEED_EX[name]||"기타",best1RM:0};exercises.push(e);}else if(bodyPart&&(!e.bodyPart||e.bodyPart==="기타"))e.bodyPart=bodyPart;return e;}
  function bodyPartFor(name){var e=findEx(name);return (e&&e.bodyPart)||SEED_EX[name]||"기타";}

  // 지난 기록: 가장 최근 완료 세션에서 해당 종목의 대표 세트(최고 무게) + 날짜
  function lastRecord(name){
    for(var i=sessions.length-1;i>=0;i--){
      var s=sessions[i];
      for(var j=0;j<s.entries.length;j++){
        var en=s.entries[j];
        if(en.exercise===name){
          var best=null;
          for(var k=0;k<en.sets.length;k++){var st=en.sets[k];if(st.reps>0&&(best==null||toKg(st.weight,en.unit)>toKg(best.weight,en.unit)))best=st;}
          if(best)return {set:best,unit:en.unit,date:s.date,memo:en.memo||""};
        }
      }
    }
    return null;
  }
  function daysAgoLabel(iso){
    var d=new Date(iso+"T00:00:00"),now=new Date(todayISO()+"T00:00:00");
    var diff=Math.round((now-d)/86400000);
    if(diff<=0)return "오늘";if(diff===1)return "어제";return diff+"일 전";
  }

  function activeVolumeKg(){

  function addEntry(name,bodyPart){

    var unit=last?last.unit:(settings.unit||"kg");
    var seed=last?{weight:last.set.weight,reps:last.set.reps}:{weight:"",reps:""};
    active.entries.push({exercise:name,bodyPart:e.bodyPart,unit:unit,memo:last?last.memo:"",

  // 드래그 정렬 (라이브러리 없이 Pointer Events). listEl 안의 [data-row][data-idx] 행을
  // [data-drag-handle] 를 길게 눌러(롱프레스) 끌어 재배치. 드롭 시 setArr(재배열된 배열) 호출.
  var LONGPRESS_MS=320, DRAG_CANCEL_PX=10;
  function enableDragSort(listEl,getArr,setArr){
    $$(listEl,"[data-drag-handle]").forEach(function(handle){
      handle.style.touchAction="none";
      handle.addEventListener("pointerdown",function(e){
        var row=e.target.closest("[data-row]");if(!row)return;
        e.preventDefault();
        var sx=e.clientX,sy=e.clientY,active=false,grabDy=0,tY=0;
        function activate(){
          active=true;grabDy=sy-row.getBoundingClientRect().top;tY=0;
          row.classList.add("dragging");document.body.classList.add("dragging-active");
          row.style.transition="none";row.style.willChange="transform";
          if(navigator.vibrate){try{navigator.vibrate(12);}catch(_){}}
          follow(sy);
        }
        // 터치는 길게 눌러 시작(스크롤과 구분), 마우스·펜은 바로 드래그 시작
        var hold=(e.pointerType==="touch")?setTimeout(activate,LONGPRESS_MS):(activate(),null);
        function follow(y){  // 잡은 행이 커서를 따라 떠서 움직이도록
          var naturalTop=row.getBoundingClientRect().top-tY;
          tY=(y-grabDy)-naturalTop;
          row.style.transform="translateY("+tY+"px)";
        }
        function reorder(y){  // 커서가 다른 행의 중앙을 넘으면 그 자리로 재배치(FLIP 애니메이션)
          var sibs=$$(listEl,"[data-row]").filter(function(c){return c!==row;}),ref=null;
          for(var i=0;i<sibs.length;i++){var rc=sibs[i].getBoundingClientRect();if(y<rc.top+rc.height/2){ref=sibs[i];break;}}
          var move2=ref?(ref.previousElementSibling!==row):(listEl.lastElementChild!==row);
          if(!move2)return;
          var firsts=sibs.map(function(c){return {el:c,top:c.getBoundingClientRect().top};});
          if(ref)listEl.insertBefore(row,ref);else listEl.appendChild(row);
          firsts.forEach(function(f){var d=f.top-f.el.getBoundingClientRect().top;if(!d)return;
            f.el.style.transition="none";f.el.style.transform="translateY("+d+"px)";
            f.el.getBoundingClientRect();  // 리플로우 강제
            f.el.style.transition="transform .18s ease";f.el.style.transform="";});
        }
        function move(ev){
          if(!active){  // 홀드 전에 움직이면(스크롤/탭) 취소
            if(Math.abs(ev.clientX-sx)>DRAG_CANCEL_PX||Math.abs(ev.clientY-sy)>DRAG_CANCEL_PX){clearTimeout(hold);endDrag();}
            return;
          }
          ev.preventDefault();reorder(ev.clientY);follow(ev.clientY);
        }
        function up(){
          clearTimeout(hold);
          document.removeEventListener("pointermove",move,true);document.removeEventListener("pointerup",up,true);document.removeEventListener("pointercancel",up,true);
          if(!active){clearStyles();return;}
          var order=$$(listEl,"[data-row]").map(function(c){return +c.getAttribute("data-idx");});
          var changed=order.some(function(v,i){return v!==i;});
          if(!changed&&Math.abs(tY)<2){clearStyles();return;}
          // 놓으면 제자리로 스르륵 안착
          row.style.transition="transform .17s cubic-bezier(.2,.7,.3,1)";row.style.transform="translateY(0px)";
          var done=false;
          function fin(){if(done)return;done=true;row.removeEventListener("transitionend",fin);clearStyles();
            if(changed){var arr=getArr();setArr(order.map(function(idx){return arr[idx];}));}}
          row.addEventListener("transitionend",fin);setTimeout(fin,220);
        }
        function endDrag(){  // 활성화 전 취소
          document.removeEventListener("pointermove",move,true);document.removeEventListener("pointerup",up,true);document.removeEventListener("pointercancel",up,true);
          clearStyles();
        }
        function clearStyles(){
          row.classList.remove("dragging");document.body.classList.remove("dragging-active");
          row.style.transition="";row.style.transform="";row.style.willChange="";
        }
        // document 레벨에서 받아야 행이 DOM에서 이동해도 이벤트가 끊기지 않음(캡처 이탈 방지)
        document.addEventListener("pointermove",move,true);document.addEventListener("pointerup",up,true);document.addEventListener("pointercancel",up,true);
      });
    });
  }

  // 마지막으로 값이 채워진 세트 기준 추천/PR
  function recForEntry(en){
    var st=null;
    for(var i=en.sets.length-1;i>=0;i--){var s=en.sets[i];if(s.weight>0&&s.reps>0){st=s;break;}}
    if(!st)return null;
    var wKg=toKg(st.weight,en.unit);
    var e1=estimate1RM(wKg,+st.reps,st.rpe!=null?+st.rpe:null);
    var exObj=findEx(en.exercise);var prev=exObj?exObj.best1RM:0;
    if(e1>prev*1.001 && prev>0 && +st.reps<=12){
      var attempt=roundToUnit(fromKg(e1*pctFromRepsRPE(3,9),en.unit),en.unit);
      return {pr:true,html:'<span class="em">🔥</span><div><b>1RM 갱신 가능!</b> 추정 1RM '+fmt(fromKg(e1,en.unit))+en.unit+
        ' (이전 '+fmt(fromKg(prev,en.unit))+en.unit+'). 다음에 <b>'+fmt(attempt)+en.unit+' × 3회</b> 도전해보세요.</div>'};
    }
    // 추천: 직전 세트 8회 이상이면 동일 무게 유지, 8회 미만이면 8회 가능 무게로 감량
    var lastReps=+st.reps, curW=+st.weight, e1disp=fmt(fromKg(e1,en.unit))+en.unit;
    if(lastReps>=8){
      return {pr:false,html:'<span class="em">💡</span><div>다음 세트: 동일 무게 <b>'+fmt(curW)+en.unit+' 유지</b> '+
        '<span class="faint">(8회 이상 목표 · 추정 1RM '+e1disp+')</span></div>'};
    }
    var dropW=recommendNextSet(e1,8,en.unit).weight;
    if(dropW>=curW)dropW=roundToUnit(curW-incForUnit(en.unit),en.unit);
    return {pr:false,html:'<span class="em">💡</span><div>다음 세트: <b>'+fmt(dropW)+en.unit+' × 8회</b>로 낮추기 '+
      '<span class="faint">(직전 '+lastReps+'회 · 추정 1RM '+e1disp+')</span></div>'};
  }

  var timerInt=null;
  // 첫 세트 입력/완료 시 경과시간 시작
  function ensureTimerStarted(){if(active&&!active.startTs){active.startTs=Date.now();persistActive();}}
  function tickTimer(){
    if(!active){if(timerInt){clearInterval(timerInt);timerInt=null;}return;}
    function upd(){var el2=$("#elapsed");if(!el2||!active){if(timerInt){clearInterval(timerInt);timerInt=null;}return;}
      if(!active.startTs){el2.textContent="00:00";return;}  // 아직 입력 전이면 대기
      var sec=Math.floor((Date.now()-active.startTs)/1000);
      var h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
      el2.textContent=(h>0?String(h)+":":"")+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}

  function startSession(preItems){
    active={id:uid("s"),date:todayISO(),startTs:null,endTs:null,entries:[]};  // startTs는 첫 입력 때 설정
    if(preItems&&preItems.length){preItems.forEach(function(it){
      var last=lastRecord(it.exercise);
      var unit=last?last.unit:(settings.unit||"kg");
      var sets=[];var n=Math.max(1,it.targetSets||1);
      for(var i=0;i<n;i++)sets.push({weight:last?last.set.weight:"",reps:last?last.set.reps:(it.targetReps||""),rpe:null});
      active.entries.push({exercise:it.exercise,bodyPart:it.bodyPart||bodyPartFor(it.exercise),unit:unit,memo:last?last.memo:"",sets:sets});
    });}
    persistActive();renderToday();
  }
  function endSession(){
    if(!active)return;
    // 완료 체크된 세트만 기록·볼륨에 반영
    var uncheckedCount=0;
    active.entries.forEach(function(en){en.sets.forEach(function(s){if(!s.done&&s.weight>0&&s.reps>0)uncheckedCount++;});});
    var kept=active.entries.filter(function(en){return en.sets.some(function(s){return s.done&&s.weight>0&&s.reps>0;});});
    kept.forEach(function(en){en.sets=en.sets.filter(function(s){return s.done&&s.weight>0&&s.reps>0;});});
    if(kept.length===0){if(confirm("완료 체크한 세트가 없습니다. 운동을 취소할까요?")){active=null;save(K.active,null);if(timerInt){clearInterval(timerInt);timerInt=null;}renderToday();}return;}
    if(uncheckedCount>0 && !confirm("완료 체크 안 한 세트 "+uncheckedCount+"개는 저장되지 않습니다. 종료할까요?"))return;
    var durationSec=active.startTs?Math.floor((Date.now()-active.startTs)/1000):0;
    var volKg=0,prs=[];
    kept.forEach(function(en){
      var exo=ensureEx(en.exercise,en.bodyPart);var bestE1=exo.best1RM;
      en.sets.forEach(function(s){
        volKg+=toKg(s.weight,en.unit)*(+s.reps);
        var e1=estimate1RM(toKg(s.weight,en.unit),+s.reps,s.rpe!=null?+s.rpe:null);
        if(e1>bestE1)bestE1=e1;
      });
      if(bestE1>exo.best1RM*1.001){if(exo.best1RM>0)prs.push({name:en.exercise,e1:bestE1,prev:exo.best1RM,unit:en.unit});exo.best1RM=bestE1;}
    });
    var sess={id:active.id,date:active.date,startTs:active.startTs,endTs:Date.now(),durationSec:durationSec,entries:kept,totalVolume:volKg};
    sessions.push(sess);save(K.sessions,sessions);save(K.exercises,exercises);
    active=null;save(K.active,null);
    if(timerInt){clearInterval(timerInt);timerInt=null;}
    renderToday();
    showSummary(sess,prs);
  }

  // 추정 소모 칼로리: MET 기반 (Compendium of Physical Activities, 저항운동 ~5.0 MET)
  //   kcal = MET × 3.5 × 체중(kg) / 200 × 분
  var CAL_MET=5.0;
  function estimateCalories(durationSec){

    return Math.round(CAL_MET*3.5*bw/200*(durationSec/60));

  function buildSummarySVG(sess,prs){
    var FF="-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',Roboto,sans-serif";
    var FM="'JetBrains Mono','SF Mono',monospace";
    var groups={};sess.entries.forEach(function(en){groups[en.bodyPart]=true;});
    var cf=function(g){return groups[g]?MUSCLE_HI:MUSCLE_BASE;};
    var parts=BODY_PARTS.filter(function(p){return groups[p];});
    var n=sess.entries.length;
    var vol=sess.totalVolume, cal=estimateCalories(sess.durationSec);
    var rowsTop=760, rowH=34;
    var base=rowsTop+n*rowH;
    var prCount=Math.min(prs.length,3);
    if(prCount)base=base+16+10+prCount*28;
    var Hgt=base+28;

    var P=[];
    P.push('<svg id="summarySvg" data-date="'+esc(sess.date)+'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 '+Hgt+'" style="width:100%;height:auto;display:block;border-radius:14px;border:1px solid #E7E9EE">');
    P.push('<rect x="0" y="0" width="720" height="'+Hgt+'" fill="#ffffff"/>');
    P.push('<rect x="0" y="0" width="6" height="'+Hgt+'" fill="#3b82f6"/>');
    P.push('<text x="40" y="54" font-family="'+FF+'" font-size="32" font-weight="800" fill="#14171A">운동 완료</text>');
    P.push('<text x="680" y="46" text-anchor="end" font-family="'+FF+'" font-size="16" fill="#6b7280">'+esc(sess.date)+'</text>');
    P.push('<text x="40" y="80" font-family="'+FF+'" font-size="15" fill="#9aa1ac">오늘도 수고했어요 · Training Log</text>');
    // 근육 도식 (정면/후면)
    P.push('<g transform="translate(140,88)">');
    P.push(muscleFigureSVG(0,"front",cf));
    P.push(muscleFigureSVG(240,"back",cf));
    P.push('<text x="100" y="462" text-anchor="middle" font-family="'+FF+'" font-size="14" fill="#9aa1ac">정면</text>');
    P.push('<text x="340" y="462" text-anchor="middle" font-family="'+FF+'" font-size="14" fill="#9aa1ac">후면</text>');
    P.push('</g>');
    // 운동 부위
    P.push('<text x="360" y="584" text-anchor="middle" font-family="'+FF+'" font-size="18" font-weight="700" fill="#E0662A">'+esc(parts.length?parts.join("   ·   "):"—")+'</text>');
    // 스탯 3열
    var cols=[[180,durLabel(sess.durationSec),"운동 시간"],[360,fmt(vol),"총 볼륨 (kg)"],[540,String(cal),"추정 소모 (kcal)"]];
    cols.forEach(function(c){
      P.push('<text x="'+c[0]+'" y="640" text-anchor="middle" font-family="'+FM+'" font-size="30" font-weight="700" fill="#14171A">'+esc(c[1])+'</text>');
      P.push('<text x="'+c[0]+'" y="666" text-anchor="middle" font-family="'+FF+'" font-size="13" fill="#6b7280">'+esc(c[2])+'</text>');
    });
    P.push('<line x1="40" y1="700" x2="680" y2="700" stroke="#E7E9EE" stroke-width="1.5"/>');
    P.push('<text x="40" y="730" font-family="'+FF+'" font-size="15" font-weight="700" fill="#6b7280">종목별 요약</text>');
    // 종목별 행
    sess.entries.forEach(function(en,i){
      var y=rowsTop+i*rowH;
      var top=en.sets.reduce(function(a,b){return toKg(b.weight,en.unit)>toKg(a.weight,en.unit)?b:a;},en.sets[0]);
      var evol=0;en.sets.forEach(function(s){evol+=toKg(s.weight,en.unit)*(+s.reps);});
      P.push('<circle cx="46" cy="'+(y-5)+'" r="4" fill="#3b82f6"/>');
      P.push('<text x="60" y="'+y+'" font-family="'+FF+'" font-size="16" font-weight="600" fill="#14171A">'+esc(en.exercise)+'</text>');
      P.push('<text x="680" y="'+y+'" text-anchor="end" font-family="'+FM+'" font-size="13" fill="#6b7280">'+en.sets.length+'세트 · 최고 '+esc(fmt(top.weight)+en.unit+"×"+top.reps)+' · '+esc(fmt(evol))+'kg</text>');
    });
    // PR
    if(prCount){
      var py=base-prCount*28-6;
      P.push('<text x="40" y="'+py+'" font-family="'+FF+'" font-size="14" font-weight="700" fill="#E0662A">🔥 이번 세션 신기록</text>');
      prs.slice(0,3).forEach(function(p,i){
        var ly=py+22+i*28;
        P.push('<text x="46" y="'+ly+'" font-family="'+FF+'" font-size="14" fill="#E0662A">'+esc(p.name)+' — 추정 1RM '+esc(fmt(fromKg(p.e1,p.unit))+p.unit)+' 갱신</text>');
      });
    }
    P.push('</svg>');
    return P.join("");
  }

  // 요약 SVG → PNG 저장 (외부 라이브러리 없이 SVG를 canvas로 래스터화)
  function saveSummaryImage(){
    var svg=document.getElementById("summarySvg");if(!svg)return;
    var vb=svg.getAttribute("viewBox").split(/\s+/);var w=+vb[2],h=+vb[3];
    var clone=svg.cloneNode(true);clone.removeAttribute("style");clone.setAttribute("width",w);clone.setAttribute("height",h);
    var xml=new XMLSerializer().serializeToString(clone);
    var url="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
    var img=new Image();
    img.onload=function(){
      var sc=2,c=el("canvas");c.width=w*sc;c.height=h*sc;
      var ctx=c.getContext("2d");ctx.setTransform(sc,0,0,sc,0,0);ctx.fillStyle="#ffffff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
      try{c.toBlob(function(blob){if(!blob){toast("이미지 생성 실패");return;}
        var a=el("a");a.href=URL.createObjectURL(blob);a.download="workout-"+(svg.getAttribute("data-date")||todayISO())+".png";
        document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href);},1000);toast("이미지 저장됨");
      },"image/png");}catch(e){toast("이미지 생성 실패");}
    };
    img.onerror=function(){toast("이미지 생성 실패");};
    img.src=url;
  }

  var histTab="sessions";
  function renderHistory(){
    var v=$("#view-history");v.innerHTML="";

  function renderSessionsList(v){
    if(!sessions.length){v.appendChild(emptyCard("📖","아직 기록이 없습니다","운동을 완료하면 여기에 쌓입니다"));return;}
    for(var i=sessions.length-1;i>=0;i--){
      var s=sessions[i];
      var h=Math.floor(s.durationSec/3600),m=Math.floor(s.durationSec%3600/60);
      var dur=(h>0?h+"시간 ":"")+m+"분";
      var lis=s.entries.map(function(en){
        var top=en.sets.reduce(function(a,b){return toKg(b.weight,en.unit)>toKg(a.weight,en.unit)?b:a;},en.sets[0]);
        return '<li><span>'+esc(en.exercise)+' <span class="faint">'+en.sets.length+'세트</span></span><span class="sv">'+fmt(top.weight)+en.unit+'×'+top.reps+'</span></li>';
      }).join("");
      var card=el("div",{class:"card sess-card"},
        '<div class="sh"><div class="d">'+esc(s.date)+' <span class="faint" style="font-weight:500;font-size:12px">'+dur+'</span></div>'+
        '<div class="badge accent">'+fmt(fromKg(s.totalVolume,settings.unit))+' '+settings.unit+'</div></div>'+
        '<ul>'+lis+'</ul>'+
        '<button class="btn sm danger" style="margin-top:10px" data-del="'+s.id+'">기록 삭제</button>');
      card.querySelector("[data-del]").onclick=(function(id){return function(){if(confirm("이 세션 기록을 삭제할까요?")){sessions=sessions.filter(function(x){return x.id!==id;});save(K.sessions,sessions);recomputeBests();renderHistory();}};})(s.id);
      v.appendChild(card);
    }
  }

  function renderByExercise(v){
    var names={};
    sessions.forEach(function(s){s.entries.forEach(function(en){(names[en.exercise]=names[en.exercise]||[]).push({date:s.date,en:en});});});
    var keys=Object.keys(names);
    if(!keys.length){v.appendChild(emptyCard("📖","아직 기록이 없습니다","운동을 완료하면 종목별로 정리됩니다"));return;}
    keys.sort(function(a,b){return names[b].slice(-1)[0].date.localeCompare(names[a].slice(-1)[0].date);});
    keys.forEach(function(name){
      var hist=names[name];var exo=findEx(name);
      var series=hist.map(function(h){var best=0;h.en.sets.forEach(function(s){var e1=estimate1RM(toKg(s.weight,h.en.unit),+s.reps,s.rpe!=null?+s.rpe:null);if(e1>best)best=e1;});return best;});
      var last=hist.slice(-1)[0];
      var top=last.en.sets.reduce(function(a,b){return toKg(b.weight,last.en.unit)>toKg(a.weight,last.en.unit)?b:a;},last.en.sets[0]);
      var card=el("div",{class:"card"},
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px"><b>'+esc(name)+'</b>'+
        '<span class="badge">'+esc(bodyPartFor(name))+'</span></div>'+
        '<div class="mono muted" style="font-size:13px;margin-bottom:8px">최근 '+fmt(top.weight)+last.en.unit+'×'+top.reps+' · '+daysAgoLabel(last.date)+
        (exo&&exo.best1RM?' · 추정 1RM '+fmt(fromKg(exo.best1RM,settings.unit))+settings.unit:'')+'</div>'+
        sparkline(series));
      v.appendChild(card);
    });
  }

  function sparkline(vals){
    if(vals.length<2)return '<div class="faint" style="font-size:12px">추이는 2회 이상 기록 시 표시됩니다</div>';
    var w=Math.min(520,Math.max(160,vals.length*40)),hh=48,pad=4;
    var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals);var rng=max-min||1;
    var pts=vals.map(function(x,i){var px=pad+i*((w-2*pad)/(vals.length-1));var py=hh-pad-((x-min)/rng)*(hh-2*pad);return px.toFixed(1)+","+py.toFixed(1);});
    var lastx=pts[pts.length-1].split(",");
    return '<svg class="spark" viewBox="0 0 '+w+' '+hh+'" width="100%" height="'+hh+'" preserveAspectRatio="none">'+
      '<polyline points="'+pts.join(" ")+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
      '<circle cx="'+lastx[0]+'" cy="'+lastx[1]+'" r="3" fill="var(--accent)"/></svg>';
  }

  function recomputeBests(){
    exercises.forEach(function(e){e.best1RM=0;});
    sessions.forEach(function(s){s.entries.forEach(function(en){var exo=ensureEx(en.exercise,en.bodyPart);
      en.sets.forEach(function(st){var e1=estimate1RM(toKg(st.weight,en.unit),+st.reps,st.rpe!=null?+st.rpe:null);if(e1>exo.best1RM)exo.best1RM=e1;});});});
    save(K.exercises,exercises);
  }

  // 지난 기록 팝업: 분석(추정1RM 추이) + 이전 기록(세션별 볼륨/e1RM/강도/세트)
  var histExTab="records";
  function openExerciseHistory(name){
    var hist=[];  // {date, en} 최신순
    for(var i=sessions.length-1;i>=0;i--){var s=sessions[i];s.entries.forEach(function(en){if(en.exercise===name)hist.push({date:s.date,en:en});});}
    function e1e(en){var b=0;en.sets.forEach(function(st){var v=estimate1RM(toKg(st.weight,en.unit),+st.reps,st.rpe!=null?+st.rpe:null);if(v>b)b=v;});return b;}
    function volE(en){var v=0;en.sets.forEach(function(st){v+=toKg(st.weight,en.unit)*(+st.reps);});return v;}
    function maxW(en){var m=0;en.sets.forEach(function(st){var w=toKg(st.weight,en.unit);if(w>m)m=w;});return m;}
    function koDate(iso){var p=iso.split("-");return +p[0]+"년 "+(+p[1])+"월 "+(+p[2])+"일";}
    var head='<h3 style="margin-bottom:2px">'+esc(name)+'</h3><p class="sub" style="margin-bottom:12px">'+esc(bodyPartFor(name))+'</p>';
    if(!hist.length){openSheet(head+'<div class="empty muted" style="padding:20px">아직 기록이 없습니다</div><button class="btn primary block" id="hClose">닫기</button>');$("#hClose").onclick=closeSheet;return;}

    function recordsHTML(){
      return '<div class="hlist">'+hist.map(function(h){
        var vol=volE(h.en),e1=e1e(h.en),inten=e1>0?Math.round(maxW(h.en)/e1*100):0;
        var rows=h.en.sets.map(function(st,i){return '<div class="hset-row"><span class="hset-i">'+(i+1)+'</span>'+
          '<span class="hcell"><b class="hn">'+fmt(st.weight)+'</b><span class="u">'+esc(h.en.unit)+'</span></span>'+
          '<span class="hcell"><b class="hn">'+st.reps+'</b><span class="u">회</span></span>'+
          '<span class="hset-rpe">'+(st.rpe!=null?'RPE '+st.rpe:'')+'</span></div>';}).join('');
        var memo=h.en.memo?'<div class="hmemo">📝 '+esc(h.en.memo)+'</div>':'';
        return '<div class="hcard"><div class="faint" style="font-size:12px">'+esc(koDate(h.date))+' · '+daysAgoLabel(h.date)+'</div>'+
          '<div class="hvol">볼륨 <b>'+fmt(fromKg(vol,settings.unit))+'kg</b></div>'+
          '<div class="faint" style="font-size:13px;margin-bottom:8px">e1RM '+fmt(fromKg(e1,settings.unit))+'kg · 강도 '+inten+'%</div>'+
          memo+'<div class="hsets2">'+rows+'</div></div>';
      }).join('')+'</div>';
    }
    function analysisHTML(){
      var series=hist.slice().reverse().map(function(h){return e1e(h.en);});   // 오래된→최근
      var dates=hist.slice().reverse().map(function(h){return h.date;});
      var cur=series[series.length-1];
      var out='<div class="card" style="padding:14px;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-weight:700">내 현재 추정 1RM</span><span class="mono" style="font-size:22px;font-weight:800;color:var(--accent-ink)">'+fmt(fromKg(cur,settings.unit))+settings.unit+'</span></div></div>';
      if(series.length<2)return out+'<div class="faint" style="font-size:13px;padding:6px 2px">추이는 2회 이상 기록 시 표시됩니다</div>';
      var minV=Math.min.apply(null,series),maxV=Math.max.apply(null,series);
      var minI=series.indexOf(minV),maxI=series.indexOf(maxV);
      var growth=series[0]>0?Math.round((cur-series[0])/series[0]*100):null;
      return out+'<div class="card" style="padding:14px;margin-bottom:12px">'+
        (growth!=null&&growth>0?'<div style="font-weight:700;margin-bottom:10px">추정 1RM이 처음보다 <span style="color:var(--good)">'+growth+'% 성장</span>했어요</div>':'')+
        sparkline(series)+
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);margin-top:4px"><span>'+esc(dates[0].slice(2).replace(/-/g,"."))+'</span><span>'+esc(dates[dates.length-1].slice(2).replace(/-/g,"."))+'</span></div>'+
        '<div style="display:flex;gap:10px;margin-top:12px">'+
          '<div class="stat" style="flex:1"><div class="n">'+fmt(fromKg(minV,settings.unit))+'</div><div class="l">최저 · '+esc(dates[minI].slice(5).replace("-","/"))+'</div></div>'+
          '<div class="stat" style="flex:1"><div class="n">'+fmt(fromKg(maxV,settings.unit))+'</div><div class="l">최고 · '+esc(dates[maxI].slice(5).replace("-","/"))+'</div></div>'+
        '</div></div>';
    }
    function render(){
      var tabs='<div class="subtabs"><button data-t="analysis" class="'+(histExTab==="analysis"?"on":"")+'">분석</button><button data-t="records" class="'+(histExTab==="records"?"on":"")+'">이전 기록</button></div>';
      openSheet(head+tabs+(histExTab==="analysis"?analysisHTML():recordsHTML())+'<button class="btn primary block" id="hClose" style="margin-top:14px">닫기</button>');
      $$($("#sheet"),".subtabs button").forEach(function(b){b.onclick=function(){histExTab=b.getAttribute("data-t");render();};});
      $("#hClose").onclick=closeSheet;
    }
    histExTab="records";render();
  }

  function commonBodyPart(items){var c={};items.forEach(function(i){c[i.bodyPart]=(c[i.bodyPart]||0)+1;});var best="",n=0;for(var k in c)if(c[k]>n){n=c[k];best=k;}return best;}

  // 종목 선택 시트: 카테고리 탭 + 목록 탭 선택 + 검색/직접추가.  onPick(name,bodyPart) 콜백.

  function openExercisePicker(onPick,onCancel,locked){

    }

      draft.items.forEach(function(it,i){
        if(i===editIdx){
          var f=el("div",{class:"reitem-edit","data-row":"1","data-idx":String(i)});
          f.innerHTML='<label class="fl">운동 이름</label><input class="reEditName" value="'+esc(it.exercise)+'" placeholder="운동 이름" style="margin-bottom:10px">'+
            '<label class="fl">부위</label><select class="reEditBp" style="margin-bottom:12px"></select>'+
            '<div class="btn-row"><button class="btn sm ghost reEditCancel">취소</button><button class="btn sm primary reEditSave">확인</button></div>';
          var sel=f.querySelector(".reEditBp");
          BODY_PARTS.concat(["기타"]).forEach(function(p){var o=el("option",{value:p},p);if(p===it.bodyPart)o.setAttribute("selected","selected");sel.appendChild(o);});
          f.querySelector(".reEditCancel").onclick=function(){editIdx=-1;paint();};
          f.querySelector(".reEditSave").onclick=function(){var nm=f.querySelector(".reEditName").value.trim();if(!nm){toast("이름을 입력하세요");return;}
            it.exercise=nm;it.bodyPart=sel.value;ensureEx(nm,sel.value);editIdx=-1;paint();};
          box.appendChild(f);
        }else{
          var row=el("div",{class:"reitem","data-row":"1","data-idx":String(i)},
            '<span class="drag-handle" data-drag-handle title="길게 눌러 순서 변경">⠿</span>'+
            '<span class="reitem-name"><b>'+esc(it.exercise)+'</b> <span class="faint" style="font-size:12px">'+esc(it.bodyPart)+'</span></span>'+
            '<span class="reitem-actions">'+
              '<button class="rebtn edit reEdit">편집</button>'+
              '<button class="rebtn rm reRm">✕</button>'+
            '</span>');
          row.querySelector(".reEdit").onclick=function(){editIdx=i;paint();};
          row.querySelector(".reRm").onclick=function(){draft.items.splice(i,1);editIdx=-1;paint();};
          box.appendChild(row);
        }
      });
      enableDragSort(box,function(){return draft.items;},function(a){draft.items=a;editIdx=-1;paint();});}
    function tryClose(){if(draft.items.length||($("#reName")&&$("#reName").value.trim())){if(!confirm("만들던 루틴을 취소할까요? 저장하지 않은 내용은 사라집니다."))return;}closeSheet();}
    function render(){
      openSheet('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><h3 style="margin:0">'+(editing?"루틴 편집":"새 루틴")+'</h3>'+
        '<button class="btn sm ghost" id="reClose">취소</button></div><p class="sub">종목 추가 · ⠿ 길게 눌러 순서 변경</p>'+
        '<label class="fl">루틴 이름</label><input id="reName" placeholder="예: 등의 날" value="'+esc(draft.name)+'" style="margin-bottom:14px">'+
        '<div id="reItems"></div>'+
        '<button class="btn ghost block" id="reAddOpen" style="margin-top:8px">＋ 종목 추가</button>'+
        '<button class="btn good block" id="reSave" style="margin-top:12px">저장</button>', true);
      paint();
      $("#reClose").onclick=tryClose;
      $("#reAddOpen").onclick=function(){draft.name=$("#reName").value;
        openExercisePicker(function(name,bp){draft.items.push({exercise:name,bodyPart:bp,targetSets:3,targetReps:""});ensureEx(name,bp);render();},render,true);};
      $("#reSave").onclick=function(){draft.name=$("#reName").value.trim();if(!draft.name){toast("이름을 입력하세요");return;}if(!draft.items.length){toast("종목을 추가하세요");return;}
        draft.bodyPart=commonBodyPart(draft.items);
        if(editing){for(var i=0;i<routines.length;i++)if(routines[i].id===draft.id)routines[i]=draft;}else routines.push(draft);
        save(K.routines,routines);closeSheet();renderRoutines();toast("저장됨");};
    }
    render();
  }

/* ============================================================
   렌더: 리포트 (주간)
   ============================================================ */
  var weekOffset=0; // 0=이번 주
  function weekBounds(offset){
    var now=new Date(todayISO()+"T00:00:00");
    var dow=(now.getDay()+6)%7; // 월=0
    var mon=new Date(now);mon.setDate(now.getDate()-dow+offset*7);
    var sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return {startISO:todayISO(mon),endISO:todayISO(sun)};
  }
  function volByPartInWeek(offset){
    var b=weekBounds(offset);var parts={};var total=0,sessCount=0,durSec=0;
    sessions.forEach(function(s){
      if(s.date>=b.startISO&&s.date<=b.endISO){sessCount++;durSec+=s.durationSec||0;
        s.entries.forEach(function(en){en.sets.forEach(function(st){var v=toKg(st.weight,en.unit)*(+st.reps);parts[en.bodyPart]=(parts[en.bodyPart]||0)+v;total+=v;});});}
    });
    return {parts:parts,total:total,sessions:sessCount,durSec:durSec,bounds:b};
  }
  function renderReport(){
    var v=$("#view-report");v.innerHTML="";
    var cur=volByPartInWeek(weekOffset),prev=volByPartInWeek(weekOffset-1);
    var b=cur.bounds;
    var rangeLbl=(weekOffset===0?"이번 주":weekOffset===-1?"지난 주":b.startISO.slice(5)+" ~ "+b.endISO.slice(5));
    v.appendChild(el("div",{class:"weeknav"},
      '<button class="icon-btn" id="wPrev">‹</button><div class="rng">'+rangeLbl+' <span class="faint" style="font-weight:500;font-size:12px">'+b.startISO.slice(5).replace("-","/")+'~'+b.endISO.slice(5).replace("-","/")+'</span></div>'+
      '<button class="icon-btn" id="wNext"'+(weekOffset>=0?' disabled style="opacity:.35"':"")+'>›</button>'));
    $("#wPrev").onclick=function(){weekOffset--;renderReport();};
    $("#wNext").onclick=function(){if(weekOffset<0){weekOffset++;renderReport();}};

    var h=Math.floor(cur.durSec/3600),m=Math.floor(cur.durSec%3600/60);
    v.appendChild(el("div",{class:"statgrid"},
      '<div class="stat"><div class="n">'+cur.sessions+'</div><div class="l">운동 횟수</div></div>'+
      '<div class="stat"><div class="n">'+(h>0?h+"h ":"")+m+"m"+'</div><div class="l">총 시간</div></div>'+
      '<div class="stat"><div class="n">'+fmt(fromKg(cur.total,settings.unit))+'</div><div class="l">볼륨 ('+settings.unit+')</div></div>'));

    var partCard=el("div",{class:"card"},'<h2>부위별 볼륨 <span>'+deltaHTML(cur.total,prev.total)+'</span></h2>');
    var order=BODY_PARTS.filter(function(p){return cur.parts[p]||prev.parts[p];});
    if(!order.length){partCard.appendChild(el("div",{class:"empty muted",style:"padding:20px"},"이 주에는 기록이 없습니다"));}
    else{
      var maxV=Math.max.apply(null,order.map(function(p){return cur.parts[p]||0;}))||1;
      order.forEach(function(p){
        var cv=cur.parts[p]||0,pv=prev.parts[p]||0;
        partCard.appendChild(el("div",{class:"barrow"},
          '<div class="nm">'+esc(p)+'</div>'+
          '<div class="bartrack"><div class="barfill" style="width:'+(cv/maxV*100).toFixed(1)+'%"></div></div>'+
          '<div class="val">'+fmt(fromKg(cv,settings.unit))+'<br>'+deltaHTML(cv,pv)+'</div>'));
      });
      partCard.appendChild(el("div",{class:"faint",style:"font-size:11px;margin-top:6px"},"막대 = "+settings.unit+" 볼륨 · 우측 = 지난 주 대비"));
    }
    v.appendChild(partCard);

    var prs=weekPRs(cur.bounds);
    if(prs.length){
      var prCard=el("div",{class:"card"},'<h2>이번 주 기록 🔥</h2>');
      prs.forEach(function(p){prCard.appendChild(el("div",{class:"rec pr",style:"margin-top:8px"},'<span class="em">🔥</span><div><b>'+esc(p.name)+'</b> 추정 1RM '+fmt(fromKg(p.e1,settings.unit))+settings.unit+'</div>'));});
      v.appendChild(prCard);
    }
  }
  function deltaHTML(cur,prev){
    if(prev<=0)return cur>0?'<span class="delta up">NEW</span>':'<span class="delta flat">—</span>';
    var pct=Math.round((cur-prev)/prev*100);
    if(pct>0)return '<span class="delta up">▲'+pct+'%</span>';
    if(pct<0)return '<span class="delta down">▼'+Math.abs(pct)+'%</span>';
    return '<span class="delta flat">±0%</span>';
  }
  function weekPRs(b){
    var beforeBest={},weekBest={};
    sessions.forEach(function(s){s.entries.forEach(function(en){var be=0;en.sets.forEach(function(st){var e1=estimate1RM(toKg(st.weight,en.unit),+st.reps,st.rpe!=null?+st.rpe:null);if(e1>be)be=e1;});
      if(s.date<b.startISO){if(be>(beforeBest[en.exercise]||0))beforeBest[en.exercise]=be;}
      else if(s.date>=b.startISO&&s.date<=b.endISO){if(be>(weekBest[en.exercise]||0))weekBest[en.exercise]=be;}});});
    var out=[];for(var k in weekBest){if(weekBest[k]>(beforeBest[k]||0)*1.001)out.push({name:k,e1:weekBest[k]});}
    out.sort(function(a,b){return b.e1-a.e1;});return out.slice(0,6);
  }

/* ============================================================
   렌더: 회복도 (Recovery)
   ------------------------------------------------------------
   회복률(%) = 마지막 운동 이후 경과 시간 / 부위별 회복 필요 시간.
   회복 필요 시간 = 기준시간(부위 크기) × (0.8~1.2, 마지막 세션 볼륨 보정).
   근거: 저항운동 후 회복은 보통 24~72h, 큰 근육·고볼륨일수록 오래.
         (개인차·수면·영양 영향 큼 → '추정'으로 표기)
   ============================================================ */
  function recoveryData(){
    var res={};RECOVERY_GROUPS.forEach(function(g){res[g]=null;});
    for(var i=sessions.length-1;i>=0;i--){
      var s=sessions[i],setsByG={};
      s.entries.forEach(function(en){if(res[en.bodyPart]===null&&RECOVERY_HOURS[en.bodyPart])setsByG[en.bodyPart]=(setsByG[en.bodyPart]||0)+en.sets.length;});
      for(var g in setsByG){
        var endTs=s.endTs||new Date(s.date+"T18:00:00").getTime();
        var hoursAgo=Math.max(0,(Date.now()-endTs)/3600000);
        var req=RECOVERY_HOURS[g]*(0.8+0.4*Math.min(1,setsByG[g]/8));
        res[g]={pct:Math.max(0,Math.min(100,Math.round(hoursAgo/req*100))),date:s.date,sets:setsByG[g]};
      }
    }
    return res;
  }
  // 회복률 색상: 90%↑ 초록 / 70%↑ 노랑 / 그 미만 빨강
  function recoveryColor(pct){
    return pct>=90?"#2FB344":pct>=70?"#F5C518":"#EF5B5B";
  }

  var recSide="front";
  function renderRecovery(){
    var v=$("#view-recovery");v.innerHTML="";
    var rec=recoveryData();
    var cf=function(g){var r=rec[g];return r?recoveryColor(r.pct):MUSCLE_BASE;};
    var card=el("div",{class:"card"});
    card.innerHTML=
      '<h2 style="margin-bottom:4px">근육 회복도 <span class="badge">추정</span></h2>'+
      '<div class="muted" style="font-size:13px;margin-bottom:12px">마지막 운동 이후 경과 시간과 부위 크기로 추정해요. <b style="color:#37B24D">초록=회복</b> · <b style="color:#EF5B5B">빨강=피로</b></div>'+
      '<div class="subtabs" id="recTabs"><button data-s="front" class="'+(recSide==="front"?"on":"")+'">정면</button><button data-s="back" class="'+(recSide==="back"?"on":"")+'">후면</button></div>'+
      '<svg viewBox="0 0 200 466" style="width:100%;max-width:260px;display:block;margin:2px auto 0">'+muscleFigureSVG(0,recSide,cf)+'</svg>';
    v.appendChild(card);
    $$(card,"#recTabs button").forEach(function(b){b.onclick=function(){recSide=b.getAttribute("data-s");renderRecovery();};});

    var listCard=el("div",{class:"card"});
    var rows=RECOVERY_GROUPS.map(function(g){
      var r=rec[g];
      if(!r)return '<div class="recrow"><span class="recdot" style="background:'+MUSCLE_BASE+'"></span><span class="recname">'+g+'</span><span class="recpct faint">기록 없음</span><span class="recago"></span></div>';
      var col=recoveryColor(r.pct);
      var state=r.pct>=90?"회복 완료":r.pct>=70?"회복 중":"피로";
      return '<div class="recrow"><span class="recdot" style="background:'+col+'"></span><span class="recname">'+g+' <span class="faint" style="font-weight:500;font-size:12px">'+state+'</span></span>'+
        '<span class="recpct" style="color:'+col+'">'+r.pct+'%</span><span class="recago faint">'+daysAgoLabel(r.date)+'</span></div>';
    }).join("");
    listCard.innerHTML='<div class="sectitle">부위별 회복</div>'+rows;
    v.appendChild(listCard);

    if(!active){
      var cta=el("button",{class:"btn primary block"},"이 상태로 운동 시작");
      cta.onclick=function(){startSession();switchTab("today");};
      v.appendChild(cta);
    }
  }

/* ============================================================
   시트/모달
   ============================================================ */
  var sheetLocked=false;  // true면 바깥 터치로 안 닫힘(루틴 편집 등 데이터 유실 방지)
  function openSheet(html,locked){var s=$("#sheet");s.innerHTML=html;sheetLocked=!!locked;$("#scrim").classList.add("open");}
  function closeSheet(){sheetLocked=false;$("#scrim").classList.remove("open");}
  $("#scrim").addEventListener("click",function(e){if(e.target===this&&!sheetLocked)closeSheet();});

  function openMenu(){
    openSheet('<h3>메뉴</h3><p class="sub">설정 · 데이터 백업 · 정보</p>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 2px 14px">'+
        '<label class="fl" style="margin:0">내 체중 (kg) <span class="faint" style="font-weight:400">· 칼로리 추정용</span></label>'+
        '<input id="mBw" class="num" inputmode="decimal" style="width:96px" value="'+(settings.bodyweightKg||70)+'"></div>'+
      '<button class="btn block" id="mExport" style="margin-bottom:10px">⬇︎ 데이터 백업 내보내기 (JSON)</button>'+
      '<button class="btn block" id="mImport" style="margin-bottom:10px">⬆︎ 백업 불러오기</button>'+
      '<button class="btn block ghost" id="mInfo" style="margin-bottom:10px">추천 방식 설명 (RPE·1RM)</button>'+
      '<div class="faint" style="font-size:12px;margin-top:8px;line-height:1.5">기록은 이 브라우저에만 저장됩니다. 기기를 바꾸거나 브라우저 데이터를 지우면 사라지니 가끔 백업하세요.</div>');
    $("#mBw").onchange=function(){var v=parseFloat(this.value);if(v>0){settings.bodyweightKg=v;save(K.settings,settings);toast("체중 저장됨");}};
    $("#mExport").onclick=exportJSON;
    $("#mImport").onclick=function(){$("#importFile").click();};
    $("#mInfo").onclick=openInfo;
  }
  function openInfo(){
    openSheet('<h3>무게·횟수 추천 원리</h3><p class="sub">자동조절(RPE/RIR) + 추정 1RM</p>'+
      '<div style="font-size:14px;line-height:1.6;color:var(--ink)">'+
      '<p><b>추정 1RM (e1RM)</b> — RPE를 입력하면 RIR 기반 RPE 스케일 표로, 없으면 Epley 공식 <span class="mono">1RM = 무게 × (1 + 횟수/30)</span> 으로 계산합니다.</p>'+
      '<p><b>RPE / RIR</b> — RPE는 세트 난이도(6~10). <span class="mono">RIR(남은 여유 횟수) = 10 − RPE</span>. 예: RPE 8 = 2회 더 할 수 있었음.</p>'+
      '<p><b>다음 세트 추천</b> — 방금 세트의 추정 1RM에 맞춰, 같은 반복수를 <b>목표 RPE 8(2회 여유)</b> 강도로 수행할 무게를 종목 단위(kg 2.5 / lb 5)로 제안합니다.</p>'+
      '<p><b>PR 감지</b> — 이번 세트 추정 1RM이 기존 최고를 넘으면 갱신을 알리고, 3회 도전 무게를 제안합니다.</p>'+
      '<p class="faint" style="font-size:12px">참고: Epley(1985); Zourdos et al.(2016) RIR-based RPE scale; Helms et al.(2016). 추정치는 참고용이며 8~12회 이하에서 정확도가 높습니다.</p>'+
      '</div><button class="btn primary block" id="infoClose" style="margin-top:8px">닫기</button>');
    $("#infoClose").onclick=closeSheet;
  }

/* ============================================================
   백업 내보내기/불러오기
   ============================================================ */
  function exportJSON(){
    var data={_app:"training-log",_v:1,exportedAt:new Date().toISOString(),settings:settings,exercises:exercises,sessions:sessions,routines:routines};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);var a=el("a");a.href=url;a.download="training-log-"+todayISO()+".json";document.body.appendChild(a);a.click();a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},1000);closeSheet();toast("백업 파일 생성됨");
  }
  $("#importFile").addEventListener("change",function(e){
    var f=e.target.files[0];if(!f)return;var rd=new FileReader();
    rd.onload=function(){try{var d=JSON.parse(rd.result);
      if(!d||!Array.isArray(d.sessions))throw 0;
      if(!confirm("백업을 불러오면 현재 데이터를 덮어씁니다. 계속할까요?"))return;
      settings=d.settings||settings;exercises=d.exercises||[];sessions=d.sessions||[];routines=d.routines||[];
      active=null;
      save(K.settings,settings);save(K.exercises,exercises);save(K.sessions,sessions);save(K.routines,routines);save(K.active,null);
      if(timerInt){clearInterval(timerInt);timerInt=null;}
      closeSheet();renderAll();toast("복원 완료");
    }catch(err){toast("파일을 읽을 수 없습니다");}};
    rd.readAsText(f);e.target.value="";
  });

/* ============================================================
   단위 토글 / 탭 / datalist
   ============================================================ */
  $("#menuBtn").onclick=openMenu;

  function updateExDatalist(){var dl=$("#exlist");var set={};exercises.forEach(function(e){set[e.name]=1;});Object.keys(SEED_EX).forEach(function(n){set[n]=1;});
    dl.innerHTML=Object.keys(set).map(function(n){return '<option value="'+esc(n)+'">';}).join("");}

  function switchTab(tab){
    $$(document,".view").forEach(function(v){v.classList.remove("active");});
    $("#view-"+tab).classList.add("active");
    $$(document,"nav.tabs button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-tab")===tab);});
    if(tab==="history")renderHistory();else if(tab==="routines")renderRoutines();else if(tab==="report")renderReport();else if(tab==="recovery")renderRecovery();else renderToday();
    window.scrollTo(0,0);
  }
  $$(document,"nav.tabs button").forEach(function(b){b.onclick=function(){switchTab(b.getAttribute("data-tab"));};});

  function renderAll(){updateExDatalist();renderToday();}

/* ============================================================
   부팅
   ============================================================ */
  updateExDatalist();renderToday();
  if(active)tickTimer();
})();
</script>
